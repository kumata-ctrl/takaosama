<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
  th, td {
    vertical-align: middle;
    white-space: nowrap;
  }

  /* === ドラッグ&ドロップエリア === */
  .drop-zone {
    border: 2px dashed #adb5bd;
    border-radius: 8px;
    background-color: #fafbfc;
    padding: 20px 16px;
    transition: background-color 0.15s, border-color 0.15s;
  }
  .drop-zone.drag-over {
    border-color: #0d6efd;
    background-color: #e7f1ff;
  }
  .drop-zone-inner {
    text-align: center;
  }
  .drop-zone-icon {
    font-size: 32px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .drop-zone-text {
    font-weight: bold;
    color: #495057;
    margin-bottom: 4px;
  }
  .drop-zone-sub {
    font-size: 0.85rem;
    color: #6c757d;
    margin-bottom: 8px;
  }
  .drop-zone input[type="file"] {
    max-width: 360px;
    margin: 0 auto;
  }
  .drop-zone-filename {
    font-size: 0.85rem;
    color: #198754;
    margin-top: 8px;
    word-break: break-all;
  }

  /* === 分割表示レイアウト === */
  .split-header {
    height: 50px;
    flex-shrink: 0;
  }

  .split-body {
    display: flex;
    height: calc(100vh - 50px);
  }

  .split-panel {
    width: 50%;
    height: 100%;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .split-left {
    background-color: #f5f5f5;
  }

  /* リサイザー */
  .split-resizer {
    width: 6px;
    background-color: #dee2e6;
    cursor: col-resize;
    flex-shrink: 0;
    transition: background-color 0.15s;
  }
  .split-resizer:hover, .split-resizer.resizing {
    background-color: #0d6efd;
  }

  .panel-label {
    flex-shrink: 0;
    padding: 6px 12px;
    font-size: 0.85rem;
    font-weight: bold;
    text-align: center;
    letter-spacing: 0.05em;
  }

  /* 原本PDFスクロールエリア */
  #pdfPages {
    flex: 1;
    overflow: auto;
    padding: 12px;
  }

  #pdfPages img {
    width: 100%;
    display: block;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    box-shadow: 0 1px 4px rgba(0, 0, 0, .15);
  }

  #pdfPages .page-label {
    font-size: 0.75rem;
    color: #666;
    text-align: center;
    margin-bottom: 4px;
  }

  /* OCRデータスクロールエリア */
  .result-scroll-area {
    flex: 1;
    overflow: auto;
  }

  /* テーブル固定レイアウト（列幅制御・画面内に収める） */
  #resultTable {
    table-layout: fixed;
    width: 100%;
    --bs-table-hover-bg: #fff9c4;
    --bs-table-striped-bg: #f9f9f9;
  }
  #resultTable th,
  #resultTable td {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    padding: 4px 6px;
  }

  /* スティッキーテーブルヘッダー + 列幅変更ハンドル用 */
  #resultTable thead th {
    position: sticky;
    top: 0;
    z-index: 1;
  }

  /* 列幅変更ハンドル */
  .col-resizer {
    position: absolute;
    right: 0;
    top: 0;
    width: 5px;
    height: 100%;
    cursor: col-resize;
    z-index: 2;
  }
  .col-resizer:hover, .col-resizer.col-resizing {
    background-color: rgba(255,255,255,0.5);
  }

  /* 編集可能セル */
  td[contenteditable="true"] {
    cursor: text;
  }
  td[contenteditable="true"]:hover {
    outline: 1px dashed #adb5bd;
  }
  td[contenteditable="true"]:focus {
    outline: 2px solid #0d6efd;
    background-color: #fff !important;
    white-space: normal;
    overflow: visible;
  }

  /* 操作列（削除・挿入ボタン） */
  #resultTable td:first-child,
  #resultTable th:first-child {
    text-align: center;
    padding: 3px 2px;
  }
  .btn-row-op {
    font-size: 0.7rem;
    line-height: 1;
    padding: 1px 5px;
    border-radius: 3px;
    visibility: hidden;
  }
  #resultTable tbody tr:hover .btn-row-op {
    visibility: visible;
  }
</style>
